<!DOCTYPE html>
<!-- HTML버전을 설정함 -->

<html lang="en">
<!-- html 태그는 웹문서의 시작을 알려줌 -->
<head>
    <meta charset="UTF-8">
    <!-- '나홀로 태그: 닫는 태그 없이 홀로 사용됨' -->
    <!-- 웹문서가 출력될때, 사용되는 인코딩을 설정하는 역할로, 현재는 대부분 UTF-8을 사용함 -->

    <title>MYHOME</title>
    <!-- <title> ~ </title>: 웹문서의 제목을 출력함 -->
</head>
<!-- 웹문서의 설정정보를 코딩함 -->

<body>
    This is index001 page.
    <!-- 문서의 본 내용 -->
</body>
<!-- 웹문서에서 화면에 출력(렌더링)되는 정보를 코딩함 -->

</html>
<!-- /html 태그는 웹문서의 끝을 알려줌 -->

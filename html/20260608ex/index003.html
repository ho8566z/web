<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IMAGE</title>
</head>
<body>
    <!-- 
    이미지 태그는 시각적 효과를 나타태고자 할때, 사용함
    <img>: 나홀로 태그(src 속성이 필수적)
     -->
    <h1>this is apple</h1>
    <p>apple is delicious</p>

    <!-- <img src="./res/img/apple.jpg" 
            width="300" 
            height="500"> -->
    <!-- <img(태그) src(경로 지정하는 필수속성)="./res/img/apple.jpg"(필수 속성 값) 
        width(추가 속성: 가로)="300"(추가 속성 값) 
        height(추가 속성: 세로)="500"(추가 속성 값)> -->
    <!-- 추가 속성: 가로, 세로는 2개 중에 1개만 사용해도, 원본의 비율이 유지됨 -->

    <img src="./res/img/apple.jpg" 
        width="300" 
        alt="this is apple" 
        title="apple"
        loading="lazy">
    <!-- alt(이미지가 없을 때, 텍스트로 대체하기 위한 용도) 
        title(그림에 커서를 올려놓을때 표시)
        loading(로딩에 화면에 나타나는 gif같은 것) -->

    <br>

    <!-- 영상 -->
    <video width="500" controls>
        <source src="./res/mov/apple.mp4" type="video/mp4">
    </video>
    <!-- <video controls> (비디오 태그: 동영상 재생 옵션)
        <source src="./res/mov/apple.mp4" type="video/mp4">
        (source: video의 세부 옵션), src(경로 지정하는 필수속성)
    </video> -->

    <iframe width="560" height="315" 
    src="https://www.youtube.com/embed/WMweEpGlu_U?si=GmuVU69DW-JiNsXq" 
    title="YouTube video player" frameborder="0" 
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
    referrerpolicy="strict-origin-when-cross-origin" 
    allowfullscreen></iframe>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LIST</title>
</head>
<body>
    <!-- 목록 관련 태그 -->

    <!-- 순서 없는 목록(인덱스x) -->
    <h2>메뉴판</h2>
    <ul>
        <li>짬뽕 8,000원</li>
        <li>간짜장 8,000원</li>
        <li>볶음밥 7,500원</li>
    </ul>

    <!-- 순서 있는 목록(인덱스o) -->
    <h2>메뉴판</h2>
    <ol type="I">
        <li>짬뽕 8,000원</li>
        <li>간짜장 8,000원</li>
        <li>볶음밥 7,500원</li>
        <li>2짬뽕 8,000원</li>
        <li>2간짜장 8,000원</li>
        <li>2볶음밥 7,500원</li>
    </ol>

    <!-- 설명 목록 -->
    <dl>
        <dt>오전 메뉴판</dt>
        <dd>짬뽕 8,000원</dd>
        <dd>간짜장 8,000원</dd>
        <dd>볶음밥 7,500원</dd>
    <br>        
        <dt>오후 메뉴판</dt>
        <dd>2짬뽕 8,000원</dd>
        <dd>2간짜장 8,000원</dd>
        <dd>2볶음밥 7,500원</dd>
    </dl>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>INDEX002</title>
</head>
<body>
    <!-- 표(table) 관련 태그 -->

    <table border="1">
        <thead>
            <tr>
                <th>1열</th>
                <th>2열</th>
                <th>3열</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1행 1열</td>
                <td>1행 2열</td>
                <td>1행 3열</td>
            </tr>
            <tr>
                <td>2행 1열</td>
                <td>2행 2열</td>
                <td>2행 3열</td>
            </tr>
            <tr>
                <td>3행 1열</td>
                <td>3행 2열</td>
                <td>3행 3열</td>
            </tr>
        </tbody>
    </table>
    <br>

    <table border="1">
        <tr>
            <td rowspan="2"><center>과목<br>학기</center></td>
            <td colspan="2"><center>국어</center></td>
            <!-- <td><center></center></td> -->
            <td colspan="2"><center>영어</center></td>
            <!-- <td><center></center></td> -->
            <td colspan="2"><center>수학</center></td>
            <!-- <td><center></center></td> -->
            <!-- [colspan="2"]은 같은 행의 2개의 열을 병합하는 용도 -->
            <!-- [rowspan="2"]은 같은 열의 2개의 행을 병합하는 용도 -->
        </tr>
        <tr>
            <!-- <td><center>학기</center></td> -->
            <td><center>1학기</center></td>
            <<td><center>2학기</center></td>
            <td><center>1학기</center></td>
            <<td><center>2학기</center></td>
            <td><center>1학기</center></td>
            <<td><center>2학기</center></td>
        </tr>
        <tr>
            <td><center>홍길동</center></td>
            <td><center>80점</center></td>
            <<td><center>90점</center></td>
            <td><center>65점</center></td>
            <td><center>100점</center></td>
            <td><center>75점</center></td>
            <td><center>95점</center></td>
        </tr>
        <tr>
            <td><center>박찬호</center></td>
            <td><center>60점</center></td>
            <<td><center>75점</center></td>
            <td><center>80점</center></td>
            <td><center>100점</center></td>
            <td><center>95점</center></td>
            <td><center>85점</center></td>
        </tr>
        <tr>
            <td><center>박세리</center></td>
            <td><center>100점</center></td>
            <<td><center>95점</center></td>
            <td><center>80점</center></td>
            <td><center>100점</center></td>
            <td><center>90점</center></td>
            <td><center>55점</center></td>
        </tr>
    </table>
</body>
</html>

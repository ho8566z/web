<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>POSITION</title>

    <style>
        div {
            width: 300px;
            height: 100px;
            text-align: center;
        }

        div.red_box {
            background-color: red;
            position: fixed;
            top: 0;
            left: 0;
        }
        div.green_box {
            background-color: green;
            position: relative;
            top: 50px;
            left: 100px;
        }
        div.blue_box {
            background-color: blue;
            position: absolute;
            top: 500px;
            left: 750px;
        }
    </style>

</head>
<body>
    
    <div class="red_box">첫 번째 요소</div>
    <div class="green_box">두 번째 요소</div>
    <div class="blue_box">세 번째 요소</div>

    <br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>

</body>
</html>
